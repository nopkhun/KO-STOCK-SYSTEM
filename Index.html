<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
    <style>
        /* Mobile: prevent iOS zoom on input focus - inputs need min 16px */
        @media (max-width: 767px) {

            input[type="text"],
            input[type="number"],
            input[type="date"],
            select,
            textarea {
                font-size: 16px !important;
            }

            input:not([type="checkbox"]):not([type="radio"]),
            select,
            textarea {
                min-height: 48px !important;
            }
        }

        /* Touch-friendly: tap targets and inputs */
        .touch-target {
            min-height: 44px;
            padding: 12px 16px;
        }

        .touch-input {
            min-height: 48px;
            padding: 12px 16px;
        }

        /* Sidebar drawer on mobile only */
        .sidebar-drawer {
            transition: transform 0.2s ease-out;
        }

        @media (max-width: 767px) {
            .sidebar-drawer {
                transform: translateX(-100%);
            }

            .sidebar-drawer.open {
                transform: translateX(0);
            }
        }

        /* Custom Loading Animation */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #f97316;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes toastFade {
            from {
                opacity: 0;
                transform: translate(-50%, 6px);
            }

            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        .toast-in {
            animation: toastFade 0.2s ease-out forwards;
        }

        @media print {
            .no-print {
                display: none !important;
            }

            main {
                padding: 0 !important;
            }
        }
    </style>
</head>

<body>
    <div id="root">
        <!-- Static Login Shell: shows immediately while React/CDN load (Phase 1 First Content Fast) -->
        <div id="static-login-shell"
            style="min-height:100vh;background:#f8fafc;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif;">
            <div
                style="background:#fff;border-radius:32px;border:1px solid #f1f5f9;box-shadow:0 20px 25px -5px rgba(0,0,0,.08);padding:40px 24px;max-width:28rem;width:100%;box-sizing:border-box;">
                <div
                    style="width:64px;height:64px;border-radius:16px;background:#ffedd5;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <path d="M14 2v6h6" />
                        <path d="M16 13H8" />
                        <path d="M16 17H8" />
                        <path d="M10 9H8" />
                    </svg>
                </div>
                <h2 style="font-size:1.5rem;font-weight:800;color:#0f172a;text-align:center;margin:0 0 8px;">เข้าสู่ระบบ
                </h2>
                <p style="color:#64748b;font-size:0.875rem;text-align:center;margin:0 0 24px;">FoodStock Manager</p>
                <div style="display:flex;flex-direction:column;gap:16px;">
                    <div>
                        <label
                            style="display:block;font-size:0.875rem;font-weight:700;color:#334155;margin-bottom:4px;">ชื่อผู้ใช้</label>
                        <input type="text" placeholder="ชื่อผู้ใช้" autocomplete="username" disabled
                            style="width:100%;min-height:48px;padding:12px 16px;background:#f8fafc;border-radius:12px;border:0;outline:none;font-size:16px;box-sizing:border-box;color:#64748b;">
                    </div>
                    <div>
                        <label
                            style="display:block;font-size:0.875rem;font-weight:700;color:#334155;margin-bottom:4px;">รหัสผ่าน</label>
                        <input type="password" placeholder="รหัสผ่าน" autocomplete="current-password" disabled
                            style="width:100%;min-height:48px;padding:12px 16px;background:#f8fafc;border-radius:12px;border:0;outline:none;font-size:16px;box-sizing:border-box;color:#64748b;">
                    </div>
                    <div style="display:flex;align-items:center;gap:8px;color:#64748b;font-size:0.8125rem;">
                        <span
                            style="display:inline-block;width:18px;height:18px;border:2px solid #e2e8f0;border-top-color:#f97316;border-radius:50%;animation:static-spin 0.7s linear infinite;"></span>
                        <span>กำลังโหลดระบบ...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <style>
        @keyframes static-spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- 1. ส่วนแก้ไข: สร้างตัวแปลง Icon (Icon Component Wrapper) ---
        // ฟังก์ชันแปลงข้อมูลดิบจาก lucide.icons ให้เป็น SVG ที่ React เข้าใจ
        const LucideIcon = ({ name, size = 24, className = "" }) => {
            const iconData = lucide.icons[name];
            if (!iconData) return null;

            return (
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width={size}
                    height={size}
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={`lucide lucide-${name} ${className}`}
                >
                    {iconData.map((child, index) => {
                        const [tag, attrs] = child;
                        return React.createElement(tag, { ...attrs, key: index });
                    })}
                </svg>
            );
        };

        // รายชื่อไอคอนที่ใช้ทั้งหมด
        const iconNames = [
            'LayoutDashboard', 'PackagePlus', 'PackageMinus', 'History', 'Store',
            'AlertTriangle', 'Search', 'Plus', 'ArrowUpCircle', 'ArrowDownCircle',
            'ChevronRight', 'ClipboardList', 'ArrowLeftRight', 'Warehouse',
            'Calendar', 'Truck', 'Trash2', 'CheckCircle2', 'Clock', 'ClipboardCheck',
            'Save', 'RotateCcw', 'BarChart3', 'TrendingUp', 'Boxes', 'Loader2',
            'Package', 'Building2', 'Pencil', 'Tags', 'Ruler', 'Filter', 'X', 'Download', 'Printer', 'Copy', 'LogOut', 'Users', 'ScrollText', 'Calculator', 'Menu', 'DollarSign'
        ];

        // สร้าง React Component สำหรับไอคอนแต่ละตัว
        const Icons = {};
        iconNames.forEach(name => {
            Icons[name] = (props) => <LucideIcon name={name} {...props} />;
        });

        // ดึงตัวแปรออกมาใช้งาน (เหมือน import ปกติ)
        const {
            LayoutDashboard, PackagePlus, PackageMinus, History, Store, AlertTriangle, Search, Plus,
            ArrowUpCircle, ArrowDownCircle, ChevronRight, ClipboardList, ArrowLeftRight, Warehouse,
            Calendar, Truck, Trash2, CheckCircle2, Clock, ClipboardCheck, Save, RotateCcw,
            BarChart3, TrendingUp, Boxes, Loader2, Package, Building2, Pencil, Tags, Ruler, Filter, X, Download, Printer, Copy, LogOut, Users, ScrollText, Calculator, Menu, DollarSign
        } = Icons;
        // -----------------------------------------------------------

        // ค่า default ต้นทุนแฝงสำหรับร้านอาหาร (user ปรับลด/เพิ่มได้)
        const DEFAULT_COST_CALC_OVERHEADS = [
            { id: 1, label: 'ค่าแรง', type: 'percent', value: '20' },
            { id: 2, label: 'ค่าไฟฟ้า/ก๊าซ', type: 'percent', value: '5' },
            { id: 3, label: 'บรรจุภัณฑ์', type: 'fixed', value: '3' },
            { id: 4, label: 'ค่าเช่า/พื้นที่', type: 'percent', value: '10' },
            { id: 5, label: 'ค่าใช้จ่ายอื่น', type: 'percent', value: '5' }
        ];

        // --- Main Application ---

        const App = () => {
            // Data States (Loaded from Sheet)
            const [itemsMaster, setItemsMaster] = useState([]);
            const [branchesMaster, setBranchesMaster] = useState([]);
            const [stock, setStock] = useState({}); // { branchId: { itemId: [lots] } }
            const [transactions, setTransactions] = useState([]);
            const [menusMaster, setMenusMaster] = useState([]);
            const [menuIngredientsMaster, setMenuIngredientsMaster] = useState([]);
            const [menuOverheadsMaster, setMenuOverheadsMaster] = useState([]);

            // Loading State
            const [isLoading, setIsLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);
            const [isRefreshing, setIsRefreshing] = useState(false);
            const [isSettingUp, setIsSettingUp] = useState(false);

            // UI States
            const [activeBranch, setActiveBranch] = useState(null);
            const [sidebarOpen, setSidebarOpen] = useState(false); // mobile drawer
            const [branchDropdownOpen, setBranchDropdownOpen] = useState(false); // desktop branch selector
            const VALID_TABS = ['dashboard', 'inventory', 'stocktake', 'history', 'reports', 'items', 'branches', 'units', 'categories', 'suppliers', 'costcalc', 'users', 'value-report'];
            const [activeTab, setActiveTabState] = useState(() => {
                try {
                    const t = new URLSearchParams(typeof window !== 'undefined' ? window.location.search : '').get('tab');
                    return (t && VALID_TABS.includes(t)) ? t : 'dashboard';
                } catch { return 'dashboard'; }
            });
            const setActiveTab = (tab) => {
                setActiveTabState(tab);
                try {
                    const u = new URL(window.location.href);
                    u.searchParams.set('tab', tab);
                    window.history.replaceState({}, '', u.toString());
                } catch (_) { }
            };
            const [searchTerm, setSearchTerm] = useState('');
            const [stockTakeSearchTerm, setStockTakeSearchTerm] = useState('');
            const [stockTakeValues, setStockTakeValues] = useState({});
            const [showModal, setShowModal] = useState(false);
            const [modalType, setModalType] = useState('in');
            const [bulkItems, setBulkItems] = useState([]);

            // History Filters
            const [historyFilters, setHistoryFilters] = useState({
                dateFrom: '',
                dateTo: '',
                branchId: '',
                itemId: '',
                type: '' // 'in', 'out', 'transfer', 'adjust', ''
            });
            // Report Filters (date range + search)
            const [reportDateFrom, setReportDateFrom] = useState('');
            const [reportDateTo, setReportDateTo] = useState('');
            const [reportSearchTerm, setReportSearchTerm] = useState('');
            const [priceReportDateFrom, setPriceReportDateFrom] = useState('');
            const [priceReportDateTo, setPriceReportDateTo] = useState('');
            const [priceReportItemId, setPriceReportItemId] = useState('');
            const [priceReportSupplierId, setPriceReportSupplierId] = useState('');
            const [itemsSearchTerm, setItemsSearchTerm] = useState('');
            const [branchesSearchTerm, setBranchesSearchTerm] = useState('');
            const [unitsSearchTerm, setUnitsSearchTerm] = useState('');
            const [categoriesSearchTerm, setCategoriesSearchTerm] = useState('');
            const [suppliersSearchTerm, setSuppliersSearchTerm] = useState('');
            const [inventoryLowStockOnly, setInventoryLowStockOnly] = useState(false);
            const [itemsSortBy, setItemsSortBy] = useState('name');
            const [branchesSortBy, setBranchesSortBy] = useState('name');
            const [unitsSortOrder, setUnitsSortOrder] = useState('asc');
            const [categoriesSortOrder, setCategoriesSortOrder] = useState('asc');
            const [suppliersSortOrder, setSuppliersSortOrder] = useState('asc');
            const [historySortOrder, setHistorySortOrder] = useState('newestFirst');
            const [inventorySortBy, setInventorySortBy] = useState('name');
            const [inventorySearchTerm, setInventorySearchTerm] = useState('');
            const [reportSortBy, setReportSortBy] = useState('name');

            const [form, setForm] = useState({
                itemId: '', amount: '', unitPrice: '', purchaseUnit: '', supplier: '', expiryDate: '', targetBranchId: '', note: '', outReason: 'เบิกใช้', recordedDate: ''
            });
            const [modalItemSearch, setModalItemSearch] = useState('');
            const [modalBranchSearch, setModalBranchSearch] = useState('');

            // Master data forms (Items / Branches / Units / Categories CRUD)
            const [itemForm, setItemForm] = useState({ id: '', name: '', unit: '', minStock: '', category: '' });
            const [branchForm, setBranchForm] = useState({ id: '', name: '', isHQ: false });
            const [unitForm, setUnitForm] = useState({ id: '', name: '' });
            const [categoryForm, setCategoryForm] = useState({ id: '', name: '' });
            const [showItemModal, setShowItemModal] = useState(false);
            const [showBranchModal, setShowBranchModal] = useState(false);
            const [showUnitModal, setShowUnitModal] = useState(false);
            const [showCategoryModal, setShowCategoryModal] = useState(false);
            const [showSupplierModal, setShowSupplierModal] = useState(false);
            const [showItemSupplierModal, setShowItemSupplierModal] = useState(false);
            const [itemSupplierForm, setItemSupplierForm] = useState({ itemId: '', supplierId: '', nameAtSupplier: '' });
            const [itemSupplierEditingSupplierId, setItemSupplierEditingSupplierId] = useState(null);
            const [editingItem, setEditingItem] = useState(null);
            const [editingBranch, setEditingBranch] = useState(null);
            const [editingUnit, setEditingUnit] = useState(null);
            const [editingCategory, setEditingCategory] = useState(null);
            const [editingSupplier, setEditingSupplier] = useState(null);

            const [supplierForm, setSupplierForm] = useState({ id: '', name: '' });
            const [codeVersion, setCodeVersion] = useState('checking...');
            const [unitsMaster, setUnitsMaster] = useState([]);
            const [categoriesMaster, setCategoriesMaster] = useState([]);
            const [suppliersMaster, setSuppliersMaster] = useState([]);
            const [itemSuppliersMaster, setItemSuppliersMaster] = useState([]);
            const [toast, setToast] = useState({ message: '', show: false, type: 'success' }); // 'success' | 'error'
            const [confirmModal, setConfirmModal] = useState({ open: false, title: '', message: '', onConfirm: () => { } });
            const [editTxModal, setEditTxModal] = useState(null); // tx being edited or null
            const [editTxForm, setEditTxForm] = useState({ amount: '', note: '' });
            const [dataLoadFailed, setDataLoadFailed] = useState(false);
            const [inventoryLoaded, setInventoryLoaded] = useState(false); // Phase 3: true when stock+transactions loaded (for dashboard skeleton)
            const [setupStatus, setSetupStatus] = useState(null);
            const [setupStatusLoading, setSetupStatusLoading] = useState(false);
            const [lastSystemDebug, setLastSystemDebug] = useState(null);
            const [lastSystemError, setLastSystemError] = useState('');

            const AUTH_STORAGE_KEY = 'ko-stock-auth';
            const [user, setUser] = useState(null);
            const [token, setToken] = useState(null);
            const [requirePasswordChange, setRequirePasswordChange] = useState(false);
            const [loginForm, setLoginForm] = useState({ username: '', password: '' });
            const [changePasswordForm, setChangePasswordForm] = useState({ newPassword: '', confirmPassword: '' });
            const [authLoading, setAuthLoading] = useState(false);

            const [usersList, setUsersList] = useState([]);
            const [showUserModal, setShowUserModal] = useState(false);
            const [userForm, setUserForm] = useState({ id: '', username: '', password: '', role: 'viewer' });
            const [editingUser, setEditingUser] = useState(null);

            // Cost calc (ต้นทุนอาหาร / ราคาขายแนะนำ) — ต้นทุนแฝงมีค่า default หลักของร้านอาหาร
            const [costCalcIngredients, setCostCalcIngredients] = useState([]);
            const [costCalcOverheads, setCostCalcOverheads] = useState(() => DEFAULT_COST_CALC_OVERHEADS.map((o, i) => ({ ...o, id: o.id })));
            const [costCalcTargetFoodCostPercent, setCostCalcTargetFoodCostPercent] = useState(30);
            const [costCalcItemSearch, setCostCalcItemSearch] = useState('');
            const [costCalcMenuId, setCostCalcMenuId] = useState('');
            const [costCalcMenuName, setCostCalcMenuName] = useState('');
            const [costCalcMenuNote, setCostCalcMenuNote] = useState('');

            const showConfirm = (opts) => setConfirmModal({ open: true, title: opts.title || 'ยืนยัน', message: opts.message || '', onConfirm: opts.onConfirm || (() => { }) });

            const showToast = (msg, type = 'success') => {
                setToast({ message: msg, show: true, type });
            };

            const showError = (err, context = '') => {
                let msg = 'เกิดข้อผิดพลาด';
                if (typeof err === 'string') {
                    msg = err;
                } else if (err && err.message) {
                    msg = err.message;
                }
                if (context) msg = `${context}: ${msg}`;
                showToast(msg, 'error');
            };

            const persistAuth = (t, u) => {
                try {
                    if (typeof sessionStorage !== 'undefined' && t && u)
                        sessionStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify({ token: t, user: u }));
                } catch (_) { }
            };

            const clearAuth = () => {
                setToken(null);
                setUser(null);
                setRequirePasswordChange(false);
                try {
                    if (typeof sessionStorage !== 'undefined') {
                        sessionStorage.removeItem(AUTH_STORAGE_KEY);
                        sessionStorage.removeItem(MASTER_CACHE_KEY);
                    }
                } catch (_) { }
            };

            const handleLogin = () => {
                const u = String(loginForm.username || '').trim();
                const p = String(loginForm.password || '');
                if (!u || !p) { showError('กรุณากรอกชื่อผู้ใช้และรหัสผ่าน'); return; }
                setAuthLoading(true);
                google.script.run
                    .withSuccessHandler((res) => {
                        setAuthLoading(false);
                        if (res && res.success) {
                            setToken(res.token);
                            setUser(res.user);
                            setRequirePasswordChange(!!res.requirePasswordChange);
                            persistAuth(res.token, res.user);
                            setLoginForm({ username: '', password: '' });
                        } else {
                            showError(res && res.error ? res.error : 'เข้าสู่ระบบไม่สำเร็จ');
                        }
                    })
                    .withFailureHandler((err) => {
                        setAuthLoading(false);
                        showError(err, 'เข้าสู่ระบบไม่สำเร็จ');
                    })
                    .login(u, p);
            };

            const handleChangePassword = () => {
                const np = String(changePasswordForm.newPassword || '');
                const cp = String(changePasswordForm.confirmPassword || '');
                if (np.length < 4) { showError('รหัสผ่านใหม่ต้องอย่างน้อย 4 ตัวอักษร'); return; }
                if (np !== cp) { showError('รหัสผ่านใหม่กับยืนยันไม่ตรงกัน'); return; }
                setAuthLoading(true);
                google.script.run
                    .withSuccessHandler((res) => {
                        setAuthLoading(false);
                        if (res && res.success) {
                            setRequirePasswordChange(false);
                            setChangePasswordForm({ newPassword: '', confirmPassword: '' });
                        } else {
                            showError(res && res.error ? res.error : 'เปลี่ยนรหัสผ่านไม่สำเร็จ');
                        }
                    })
                    .withFailureHandler((err) => {
                        setAuthLoading(false);
                        showError(err, 'เปลี่ยนรหัสผ่านไม่สำเร็จ');
                    })
                    .changePassword(token, np);
            };

            useEffect(() => {
                try {
                    const raw = typeof sessionStorage !== 'undefined' ? sessionStorage.getItem(AUTH_STORAGE_KEY) : null;
                    if (raw) {
                        const o = JSON.parse(raw);
                        if (o && o.token && o.user) {
                            setToken(o.token);
                            setUser(o.user);
                        }
                    }
                } catch (_) { }
            }, []);

            useEffect(() => {
                if (!toast.show) return;
                const t = setTimeout(() => setToast(prev => ({ ...prev, show: false })), 2200);
                return () => clearTimeout(t);
            }, [toast.show]);

            useEffect(() => {
                const onKey = (e) => {
                    if (e.key !== 'Escape') return;
                    if (isSaving) return;
                    if (confirmModal.open) { setConfirmModal(prev => ({ ...prev, open: false })); return; }
                    if (editTxModal) { setEditTxModal(null); return; }
                    if (showModal) { setShowModal(false); return; }
                    if (showItemModal) { setShowItemModal(false); return; }
                    if (showBranchModal) { setShowBranchModal(false); return; }
                    if (showUnitModal) { setShowUnitModal(false); return; }
                    if (showCategoryModal) { setShowCategoryModal(false); return; }
                    if (showSupplierModal) { setShowSupplierModal(false); return; }
                    if (showItemSupplierModal) { setShowItemSupplierModal(false); return; }
                    if (showUserModal) { setShowUserModal(false); return; }
                };
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, [confirmModal.open, editTxModal, showModal, showItemModal, showBranchModal, showUnitModal, showCategoryModal, showSupplierModal, showItemSupplierModal, showUserModal, isSaving]);

            const BRANCH_STORAGE_KEY = 'ko-stock-active-branch-id';
            const HISTORY_FILTERS_KEY = 'ko-stock-history-filters';
            const REPORT_FILTERS_KEY = 'ko-stock-report-filters';
            const SORT_PREFS_KEY = 'ko-stock-sort-prefs';
            const INVENTORY_UI_KEY = 'ko-stock-inventory-ui';
            const MASTER_CACHE_KEY = 'ko-stock-master-cache'; // Phase 4: cache for instant UI on return

            // Initial Data Fetch — Phase 2: two-phase load (basic first, then inventory+transactions)
            const loadData = (retryCount = 0) => {
                setInventoryLoaded(false);
                google.script.run
                    .withSuccessHandler((data) => {
                        try {
                            setDataLoadFailed(false);
                            if (data && data.error === 'Unauthorized') {
                                clearAuth();
                                setIsLoading(false);
                                return;
                            }
                            var d = (data && typeof data === 'object') ? data : {};
                            setLastSystemError(d._debugError || '');
                            setItemsMaster(d.items || []);
                            setBranchesMaster(d.branches || []);
                            setUnitsMaster(d.units || []);
                            setCategoriesMaster(d.categories || []);
                            setSuppliersMaster(d.suppliers || []);
                            setItemSuppliersMaster(d.itemSuppliers || []);
                            setMenusMaster(d.menus || []);
                            setMenuIngredientsMaster(d.menuIngredients || []);
                            setMenuOverheadsMaster(d.menuOverheads || []);
                            const branches = d.branches || [];
                            if (branches.length === 0) {
                                setActiveBranch(null);
                            } else {
                                const storedId = typeof sessionStorage !== 'undefined' ? sessionStorage.getItem(BRANCH_STORAGE_KEY) : null;
                                const restored = storedId ? branches.find(b => b.id === storedId) : null;
                                setActiveBranch(restored || branches[0]);
                            }
                            try {
                                const raw = typeof sessionStorage !== 'undefined' ? sessionStorage.getItem(HISTORY_FILTERS_KEY) : null;
                                if (raw) {
                                    const p = JSON.parse(raw);
                                    if (p && typeof p === 'object') setHistoryFilters({ dateFrom: p.dateFrom || '', dateTo: p.dateTo || '', branchId: p.branchId || '', itemId: p.itemId || '', type: p.type || '' });
                                }
                            } catch (_) { }
                            try {
                                const r = typeof sessionStorage !== 'undefined' ? sessionStorage.getItem(REPORT_FILTERS_KEY) : null;
                                if (r) {
                                    const q = JSON.parse(r);
                                    if (q && typeof q === 'object') {

            // 3. CE space format: "2026-01-14 10:30:00" (formatTimestamp() output, may have leading ')
            const parseThaiDate = (dateStr) => {
                if (!dateStr) return null;
                const s = String(dateStr).trim().replace(/^'/, ''); // strip leading apostrophe if any
                // --- Path 1: BE slash format "d/m/yyyyBE HH:mm:ss" ---
                const spaceIdx = s.indexOf(' ');
                const datePart = spaceIdx >= 0 ? s.slice(0, spaceIdx) : s;
                const timePart = spaceIdx >= 0 ? s.slice(spaceIdx + 1) : '';
                const dateParts = datePart.split('/');
                if (dateParts.length >= 3) {
                    const day = parseInt(dateParts[0], 10);
                    const month = parseInt(dateParts[1], 10) - 1; // JS months are 0-indexed
                    const yearBE = parseInt(dateParts[2], 10);
                    const yearCE = yearBE - 543; // Convert BE to CE
                    let hour = 0, minute = 0, second = 0;
                    if (timePart) {
                        const timeParts = timePart.split(':');

                    return new Date(yearCE, month, day, hour, minute, second);

                    const row = { item, units: {} };
                    branchesMaster.forEach(b => {
                        const lots = (stock[b.id] || {})[item.id] || [];
                        row.units[b.id] = lots.reduce((s, l) => s + l.remainingQty, 0);
                    });
                    return row;
                });
            }, [itemsMaster, branchesMaster, stock]);

            const reportDateRangeInvalid = Boolean(
                reportDateFrom && reportDateTo && new Date(reportDateFrom) > new Date(reportDateTo)
            );
            const reportFilteredTransactions = useMemo(() => {
                if (reportDateRangeInvalid) return [];
                return transactions.filter(tx => {
                    if (reportDateFrom) {
                        const txDate = parseThaiDate(tx.timestamp);
                        const from = new Date(reportDateFrom);
                        if (!txDate || isNaN(txDate.getTime()) || txDate < from) return false;
                    }
                    if (reportDateTo) {
                        const txDate = parseThaiDate(tx.timestamp);
                        const to = new Date(reportDateTo);
                        to.setHours(23, 59, 59, 999);
                        if (!txDate || isNaN(txDate.getTime()) || txDate > to) return false;
                    }
                    return true;
                });
            }, [transactions, reportDateFrom, reportDateTo, reportDateRangeInvalid]);
            // Report: History summary (count by type, optional date range)
            const reportHistorySummary = useMemo(() => {
                const list = reportDateRangeInvalid ? [] : reportFilteredTransactions;
                return {
                    in: list.filter(t => t.type === 'in').length,
                    out: list.filter(t => t.type === 'out').length,
                    transfer: list.filter(t => t.type === 'transfer').length,
                    adjust: list.filter(t => t.type === 'adjust').length
                };
            }, [reportFilteredTransactions, reportDateRangeInvalid]);
            const reportFilteredStock = useMemo(() => {
                const term = (reportSearchTerm || '').toLowerCase().trim();
                if (!term) return reportStockSummary;
                return reportStockSummary.filter(r =>
                    String(r.item?.name ?? '').toLowerCase().includes(term) ||
                    String(r.item?.category ?? '').toLowerCase().includes(term)
                );
            }, [reportStockSummary, reportSearchTerm]);

            const sortedReportStock = useMemo(() => {
                const list = [...reportFilteredStock];
                const total = (r) => branchesMaster.reduce((s, b) => s + (r.units[b.id] ?? 0), 0);
                const hasLow = (r) => {
                    const min = r.item.minStock ?? 0;
                    return branchesMaster.some(b => (r.units[b.id] ?? 0) <= min);
                };
                if (reportSortBy === 'name') list.sort((a, b) => String(a.item?.name ?? '').localeCompare(String(b.item?.name ?? ''), 'th'));
                else if (reportSortBy === 'totalQty') list.sort((a, b) => total(a) - total(b));
                else if (reportSortBy === 'lowStockFirst') list.sort((a, b) => {
                    const lowA = hasLow(a) ? 0 : 1;
                    const lowB = hasLow(b) ? 0 : 1;
                    if (lowA !== lowB) return lowA - lowB;
                    return String(a.item?.name ?? '').localeCompare(String(b.item?.name ?? ''), 'th');
                });
                return list;
            }, [reportFilteredStock, reportSortBy, branchesMaster]);

            // Value Report (Master only): stock value, daily purchases, waste value
            const valueReportStockTotal = useMemo(() => {
                let sum = 0;
                Object.keys(stock || {}).forEach(branchId => {
                    Object.keys(stock[branchId] || {}).forEach(itemId => {
                        (stock[branchId][itemId] || []).forEach(lot => {
                            const qty = Number(lot.remainingQty) || 0;
                            const up = lot.unitPrice != null && !isNaN(Number(lot.unitPrice)) ? Number(lot.unitPrice) : 0;
                            sum += qty * up;
                        });
                    });
                });
                return sum;
            }, [stock]);
            const valueReportDailyPurchases = useMemo(() => {
                const byDate = {};
                (transactions || []).filter(t => t.type === 'in').forEach(tx => {
                    const d = parseThaiDate(tx.timestamp);
                    const key = d && !isNaN(d.getTime()) ? `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}` : '';
                    if (!key) return;
                    const val = tx.totalPrice != null && !isNaN(Number(tx.totalPrice)) ? Number(tx.totalPrice) : 0;
                    byDate[key] = (byDate[key] || 0) + val;
                });
                return Object.keys(byDate).sort().reverse().map(dateKey => ({ date: dateKey, total: byDate[dateKey] }));
            }, [transactions]);
            const valueReportWasteTotal = useMemo(() => {
                return (transactions || []).filter(t => t.type === 'out' && (t.outReason || '').trim() === 'ของเสีย').reduce((sum, t) => sum + (t.outValue != null && !isNaN(Number(t.outValue)) ? Number(t.outValue) : 0), 0);
            }, [transactions]);

            const priceReportDateRangeInvalid = Boolean(
                priceReportDateFrom && priceReportDateTo && new Date(priceReportDateFrom) > new Date(priceReportDateTo)
            );
            const priceReportRows = useMemo(() => {
                if (priceReportDateRangeInvalid) return [];
                let list = transactions.filter(tx => tx.type === 'in');
                if (priceReportDateFrom) {
                    const from = new Date(priceReportDateFrom);
                    list = list.filter(tx => {
                        const d = parseThaiDate(tx.timestamp);
                        return d && !isNaN(d.getTime()) && d >= from;
                    });
                }
                if (priceReportDateTo) {
                    const to = new Date(priceReportDateTo);
                    to.setHours(23, 59, 59, 999);
                    list = list.filter(tx => {
                        const d = parseThaiDate(tx.timestamp);
                        return d && !isNaN(d.getTime()) && d <= to;
                    });
                }
                if (priceReportItemId) {
                    const item = itemsMaster.find(i => i.id === priceReportItemId);
                    const name = item ? String(item.name ?? '').trim() : '';
                    if (name) list = list.filter(tx => String(tx.itemName ?? '').trim() === name);
                }
                if (priceReportSupplierId) {
                    const sup = suppliersMaster.find(s => s.id === priceReportSupplierId);
                    const name = sup ? String(sup.name ?? '').trim() : '';
                    if (name) list = list.filter(tx => String(tx.supplier ?? '').trim() === name);
                }
                const out = list.map(tx => ({
                    ...tx,
                    _unitPrice: tx.unitPrice != null && tx.unitPrice !== '' && !isNaN(Number(tx.unitPrice)) ? Number(tx.unitPrice) : null,
                    _totalPrice: tx.totalPrice != null && tx.totalPrice !== '' && !isNaN(Number(tx.totalPrice)) ? Number(tx.totalPrice) : null
                }));
                out.sort((a, b) => {
                    const da = parseThaiDate(a.timestamp);
                    const db = parseThaiDate(b.timestamp);
                    if (!da || !db) return 0;
                    return db.getTime() - da.getTime();
                });
                return out;
            }, [transactions, priceReportDateFrom, priceReportDateTo, priceReportItemId, priceReportSupplierId, priceReportDateRangeInvalid, itemsMaster, suppliersMaster]);

            const downloadCSV = (filename, rows) => {
                const BOM = '\uFEFF';
                const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
                const blob = new Blob([BOM + csv], { type: 'text/csv;charset=utf-8' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = filename;
                a.click();
                URL.revokeObjectURL(a.href);
            };

            // Helper: FIFO Deduction Logic (Client Side Calculation)
            // Returns { keptLots, updates, deductedValue } — deductedValue = sum(deductedQty * unitPrice) per lot for reporting waste cost
            const calculateFIFODeduction = (currentStock, branchId, itemId, amount) => {
                const deductAmount = Number(amount);
                if (isNaN(deductAmount) || deductAmount < 0) return null;
                let remaining = deductAmount;
                const branchData = currentStock[branchId] || {};
                const lots = [...(branchData[itemId] || [])].sort((a, b) => new Date(a.receivedDate) - new Date(b.receivedDate));

                const updates = [];
                const keptLots = [];
                let deductedValue = 0;

                for (const lot of lots) {
                    if (remaining <= 0) {
                        keptLots.push(lot);
                        continue;
                    }
                    const lotQty = Number(lot.remainingQty) || 0;
                    const unitPrice = lot.unitPrice != null && !isNaN(Number(lot.unitPrice)) ? Number(lot.unitPrice) : 0;

                    if (lotQty <= remaining) {
                        const deducted = lotQty;
                        remaining -= deducted;
                        deductedValue += deducted * unitPrice;
                        updates.push({ ...lot, lotId: lot.id || lot.lotId, remainingQty: 0, isNewLot: false, branchId, itemId });
                    } else {
                        const deducted = remaining;
                        const newQty = Math.max(0, lotQty - remaining);
                        remaining = 0;
                        deductedValue += deducted * unitPrice;
                        updates.push({ ...lot, lotId: lot.id || lot.lotId, remainingQty: newQty, isNewLot: false, branchId, itemId });
                        keptLots.push({ ...lot, remainingQty: newQty });
                    }
                }

                if (remaining > 0) return null; // Not enough stock

                return { keptLots, updates, deductedValue };
            };

            // --- Handlers ---

            const handleStockTakeUpdate = (itemId, val) => {
                setStockTakeValues(prev => ({ ...prev, [itemId]: val }));
            };

            const performStockTakeSubmit = () => {
                setIsSaving(true);
                let localStock = JSON.parse(JSON.stringify(stock));
                let newTxList = [];
                let serverUpdates = [];
                const realTime = new Date();
                const day = realTime.getDate();
                const month = realTime.getMonth() + 1;
                const yearBE = realTime.getFullYear() + 543;
                const hours = String(realTime.getHours()).padStart(2, '0');
                const minutes = String(realTime.getMinutes()).padStart(2, '0');
                const seconds = String(realTime.getSeconds()).padStart(2, '0');
                const now = `${day}/${month}/${yearBE} ${hours}:${minutes}:${seconds}`;

                Object.keys(stockTakeValues).forEach(itemId => {
                    const actualQty = Number(stockTakeValues[itemId]);
                    if (isNaN(actualQty) || actualQty < 0) return;

                    const item = itemsMaster.find(i => i.id === itemId);
                    if (!item) return;
                    const branchStock = localStock[activeBranch.id] || {};
                    const lots = branchStock[itemId] || [];
                    const systemQty = lots.reduce((sum, lot) => sum + (Number(lot.remainingQty) || 0), 0);
                    const diff = actualQty - systemQty;

                    if (diff === 0) return;

                    if (diff < 0) {
                        const result = calculateFIFODeduction(localStock, activeBranch.id, itemId, Math.abs(diff));
                        if (result) {
                            localStock[activeBranch.id][itemId] = result.keptLots;
                            serverUpdates.push(...result.updates);
                        }
                    } else {
                        const newLot = {
                            id: `ADJ-${Date.now()}-${itemId}`,
                            receivedDate: new Date().toISOString().split('T')[0],
                            expiryDate: 'N/A',
                            supplier: 'ปรับยอดจากการนับจริง',
                            remainingQty: diff
                        };
                        if (!localStock[activeBranch.id]) localStock[activeBranch.id] = {};
                        if (!localStock[activeBranch.id][itemId]) localStock[activeBranch.id][itemId] = [];
                        localStock[activeBranch.id][itemId].push(newLot);
                        serverUpdates.push({ ...newLot, isNewLot: true, branchId: activeBranch.id, itemId });
                    }

                    const adjustSign = diff > 0 ? '+' : '-';
                    newTxList.push({
                        id: `ADJ-TX-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
                        timestamp: now,
                        fromBranch: activeBranch.name,
                        itemName: item.name,
                        type: 'adjust',
                        amount: Math.abs(diff),
                        unit: item.unit,
                        note: `ปรับยอดนับจริง ${adjustSign}${Math.abs(diff)} (เดิม ${systemQty} → จริง ${actualQty})`,
                        performedBy: user?.username || '',
                        itemId: item.id,
                        branchId: activeBranch.id
                    });
                });

                if (serverUpdates.length === 0) {
                    setIsSaving(false);
                    showToast('ไม่พบการเปลี่ยนแปลง', 'error');
                    return;
                }

                google.script.run
                    .withSuccessHandler((res) => {
                        if (res && !res.success && res.error === 'Unauthorized') { clearAuth(); setIsSaving(false); return; }
                        if (res && !res.success) { showError(res.error || 'บันทึกไม่สำเร็จ'); setIsSaving(false); return; }
                        setStock(localStock);
                        setTransactions(prev => [...newTxList, ...prev]);
                        setStockTakeValues({});
                        setActiveTab('dashboard');
                        setIsSaving(false);
                        showToast('บันทึกเรียบร้อย');
                        // โหลดข้อมูลจากเซิร์ฟเวอร์อีกครั้ง เพื่อให้ Dashboard แสดงยอดตรงกับชีต (แก้กรณีปรับสต็อกเป็น 0 แล้วยอดไม่เปลี่ยน)
                        refetchData();
                    })
                    .withFailureHandler((err) => { showError(err, 'บันทึกไม่สำเร็จ'); setIsSaving(false); })
                    .saveTransaction({ token, type: 'adjust', txData: newTxList, inventoryUpdates: serverUpdates });
            };

            const submitStockTake = () => {
                showConfirm({
                    title: 'ยืนยันการปรับยอดสต็อก',
                    message: 'ยืนยันการปรับยอดสต็อกตามจริง?',
                    onConfirm: performStockTakeSubmit
                });
            };

            const handleBulkAdd = () => {
                if (!form.itemId || !form.amount) return;
                const item = itemsMaster.find(i => i.id === form.itemId);
                const up = form.unitPrice !== '' && !isNaN(Number(form.unitPrice)) ? Number(form.unitPrice) : null;
                const sysUnit = item.unit || '';
                const u = sysUnit.trim().toLowerCase();
                const opts = u === 'กก.' || u === 'kg' || u === 'กิโลกรัม' ? ['กก.', 'กรัม'] : u === 'กรัม' || u === 'g' || u === 'gram' ? ['กรัม', 'กก.'] : [sysUnit];
                const effectivePurchaseUnit = form.purchaseUnit && opts.includes(form.purchaseUnit) ? form.purchaseUnit : (opts[0] || sysUnit);
                setBulkItems([...bulkItems, { ...form, purchaseUnit: effectivePurchaseUnit, itemName: item.name, unit: item.unit, unitPrice: up, id: Date.now() }]);
                setForm({ ...form, itemId: '', amount: '' });
            };

            const handleFinalSubmit = () => {
                if (isSaving) return;
                setIsSaving(true);

                let localStock = JSON.parse(JSON.stringify(stock));
                let newTxList = [];
                let serverUpdates = [];
                const recordedDateStr = form.recordedDate || new Date().toISOString().split('T')[0];
                const d = new Date(recordedDateStr + 'T00:00:00');
                const realTime = new Date();
                const day = d.getDate();
                const month = d.getMonth() + 1;
                const yearBE = d.getFullYear() + 543;
                const hours = String(realTime.getHours()).padStart(2, '0');
                const minutes = String(realTime.getMinutes()).padStart(2, '0');
                const seconds = String(realTime.getSeconds()).padStart(2, '0');
                const now = `${day}/${month}/${yearBE} ${hours}:${minutes}:${seconds}`;

                if (modalType === 'in') {
                    // Convert purchase unit to system unit (กก. <-> กรัม: 1 kg = 1000 g); other units: no conversion
                    const toSystem = (amount, pricePerPurchaseUnit, purchaseUnit, systemUnit) => {
                        const amt = parseFloat(amount) || 0;
                        const price = pricePerPurchaseUnit != null && !isNaN(Number(pricePerPurchaseUnit)) ? Number(pricePerPurchaseUnit) : null;
                        const pu = (purchaseUnit || '').trim().toLowerCase();
                        const su = (systemUnit || '').trim().toLowerCase();
                        const isKg = (x) => x === 'กก.' || x === 'kg' || x === 'กิโลกรัม';
                        const isG = (x) => x === 'กรัม' || x === 'g' || x === 'gram';
                        if (price == null || amt <= 0) return { qtySystem: amt, unitPriceSystem: price, totalPrice: null };
                        if (isG(pu) && isKg(su)) {
                            return { qtySystem: amt / 1000, unitPriceSystem: price * 1000, totalPrice: amt * price };
                        }
                        if (isKg(pu) && isG(su)) {
                            return { qtySystem: amt * 1000, unitPriceSystem: price / 1000, totalPrice: amt * price };
                        }
                        return { qtySystem: amt, unitPriceSystem: price, totalPrice: amt * price };
                    };
                    bulkItems.forEach(item => {
                        const purchaseUnit = item.purchaseUnit || item.unit;
                        const systemUnit = item.unit || '';
                        const { qtySystem, unitPriceSystem, totalPrice } = toSystem(item.amount, item.unitPrice, purchaseUnit, systemUnit);
                        const newLot = {
                            id: `L-${Date.now()}-${item.itemId}`,
                            receivedDate: recordedDateStr,
                            expiryDate: item.expiryDate || 'N/A',
                            supplier: item.supplier,
                            remainingQty: qtySystem,
                            unitPrice: unitPriceSystem
                        };

                        if (!localStock[activeBranch.id]) localStock[activeBranch.id] = {};
                        if (!localStock[activeBranch.id][item.itemId]) localStock[activeBranch.id][item.itemId] = [];
                        localStock[activeBranch.id][item.itemId].push(newLot);

                        serverUpdates.push({ ...newLot, isNewLot: true, branchId: activeBranch.id, itemId: item.itemId });

                        newTxList.push({
                            id: Date.now() + Math.random(),
                            timestamp: now,
                            fromBranch: activeBranch.name,
                            itemName: item.itemName,
                            type: 'in',
                            amount: String(qtySystem),
                            unit: item.unit,
                            supplier: item.supplier,
                            note: item.note,
                            unitPrice: unitPriceSystem,
                            totalPrice: totalPrice,
                            performedBy: user?.username || '',
                            itemId: item.itemId,
                            branchId: activeBranch.id
                        });
                    });
                } else if (modalType === 'out' || modalType === 'transfer') {
                    const result = calculateFIFODeduction(localStock, activeBranch.id, form.itemId, form.amount);
                    if (!result) {
                        showError('สต็อกไม่เพียงพอ');
                        setIsSaving(false);
                        return;
                    }

                    localStock[activeBranch.id][form.itemId] = result.keptLots;
                    serverUpdates.push(...result.updates);

                    const item = itemsMaster.find(i => i.id === form.itemId);

                    // If Transfer, add to target branch
                    if (modalType === 'transfer') {
                        const newLot = {
                            id: `TR-${Date.now()}`,
                            receivedDate: new Date().toISOString().split('T')[0],
                            expiryDate: 'N/A',
                            supplier: `โอนจาก ${activeBranch.name}`,
                            remainingQty: parseFloat(form.amount)
                        };
                        if (!localStock[form.targetBranchId]) localStock[form.targetBranchId] = {};
                        if (!localStock[form.targetBranchId][form.itemId]) localStock[form.targetBranchId][form.itemId] = [];
                        localStock[form.targetBranchId][form.itemId].push(newLot);

                        serverUpdates.push({ ...newLot, isNewLot: true, branchId: form.targetBranchId, itemId: form.itemId });
                    }

                    newTxList.push({
                        id: Date.now(),
                        timestamp: now,
                        fromBranch: activeBranch.name,
                        toBranch: modalType === 'transfer' ? branchesMaster.find(b => b.id === form.targetBranchId).name : null,
                        itemName: item.name,
                        type: modalType,
                        amount: form.amount,
                        unit: item.unit,
                        note: form.note,
                        performedBy: user?.username || '',
                        outReason: modalType === 'out' ? (form.outReason || 'เบิกใช้') : '',
                        outValue: modalType === 'out' && result.deductedValue != null ? result.deductedValue : null,
                        itemId: form.itemId,
                        branchId: activeBranch.id
                    });
                }

                // Send to Server
                google.script.run
                    .withSuccessHandler((res) => {
                        if (res && !res.success && res.error === 'Unauthorized') { clearAuth(); setIsSaving(false); return; }
                        if (res && !res.success) { showError(res.error || 'บันทึกไม่สำเร็จ'); setIsSaving(false); return; }
                        setStock(localStock);
                        setTransactions(prev => [...newTxList, ...prev]);
                        setShowModal(false);
                        setBulkItems([]);
                        setForm({ itemId: '', amount: '', unitPrice: '', purchaseUnit: '', supplier: (suppliersMaster[0] && suppliersMaster[0].name) || '', expiryDate: '', targetBranchId: '', note: '', outReason: 'เบิกใช้', recordedDate: new Date().toISOString().split('T')[0] });
                        setIsSaving(false);
                        showToast('บันทึกข้อมูลสำเร็จ');
                        setActiveTab('history');
                    })
                    .withFailureHandler((err) => {
                        showError(err, 'บันทึกไม่สำเร็จ');
                        setIsSaving(false);
                    })
                    .saveTransaction({
                        token,
                        type: modalType,
                        txData: newTxList,
                        inventoryUpdates: serverUpdates
                    });
            };

            const openModal = (type, item = null) => {
                setModalType(type);
                const defaultSupplier = (suppliersMaster[0] && suppliersMaster[0].name) || '';
                const todayStr = new Date().toISOString().split('T')[0];
                setForm({ ...form, itemId: item ? item.id : '', amount: '', unitPrice: '', purchaseUnit: item && type === 'in' ? (item.unit || '') : (type === 'in' ? '' : form.purchaseUnit), supplier: type === 'in' ? defaultSupplier : form.supplier, expiryDate: type === 'in' ? '' : form.expiryDate, targetBranchId: '', note: '', outReason: type === 'out' ? (form.outReason || 'เบิกใช้') : (form.outReason || 'เบิกใช้'), recordedDate: form.recordedDate || todayStr });
                setBulkItems([]);
                setModalItemSearch('');
                setModalBranchSearch('');
                setShowModal(true);
            };

            const doEditTxSubmit = (amount) => {
                if (!editTxModal || !token) return;
                setIsSaving(true);
                google.script.run
                    .withSuccessHandler((res) => {
                        if (res && !res.success && res.error === 'Unauthorized') { clearAuth(); setIsSaving(false); return; }
                        if (res && !res.success) { showError(res.error || 'แก้ไขไม่สำเร็จ'); setIsSaving(false); return; }
                        setEditTxModal(null);
                        setIsSaving(false);
                        showToast(amount === 0 ? 'ลบรายการเรียบร้อย' : 'แก้ไขเรียบร้อย');
                        refetchData();
                    })
                    .withFailureHandler((err) => { showError(err, 'แก้ไขไม่สำเร็จ'); setIsSaving(false); })
                    .updateTransaction({ token, txId: editTxModal.id, amount: String(amount), note: String(editTxForm.note || '').trim() });
            };
            const handleEditTxSubmit = () => {
                if (!editTxModal || !token) return;
                const amount = parseFloat(editTxForm.amount);
                if (isNaN(amount) || amount < 0) { showError('กรุณากรอกจำนวนที่ถูกต้อง'); return; }
                if (amount === 0) {
                    showConfirm({ title: 'ลบรายการ', message: 'จำนวน 0 หมายถึงลบรายการนี้ออกจากประวัติ (นำเข้า/เบิกออก) และคืนผลต่อสต็อก ยืนยันหรือไม่?', onConfirm: () => doEditTxSubmit(0) });
                    return;
                }
                doEditTxSubmit(amount);
            };

            const refetchData = (onDone) => {
                google.script.run
                    .withSuccessHandler((data) => {
                        if (data && data.error === 'Unauthorized') { clearAuth(); if (typeof onDone === 'function') onDone(null); return; }
                        var d = (data && typeof data === 'object') ? data : {};
                        setDataLoadFailed(false);
                        setInventoryLoaded(true);
                        setLastSystemDebug(d._debug || null);
                        setLastSystemError(d._debugError || '');
                        var emptyMaster = (d._debugError) || ((d.units || []).length === 0 && (d.categories || []).length === 0);
                        if (emptyMaster) {
                            if (d._debugError) showToast('โหลดสต็อก/ประวัติล่าสุดไม่สมบูรณ์ — ข้อมูลหลักยังใช้ได้', 'error');
                            // โหลดสต็อกและประวัติแยก (getSystemData ล้มแต่ getInventoryAndTransactions อาจได้)
                            google.script.run
                                .withSuccessHandler(function (invData) {
                                    if (invData && invData.error === 'Unauthorized') return;
                                    var inv = (invData && typeof invData === 'object') ? invData : {};
                                    setStock(inv.stock || {});
                                    setTransactions(inv.transactions || []);
