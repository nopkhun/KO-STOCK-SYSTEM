<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
    <style>
        /* Mobile: prevent iOS zoom on input focus - inputs need min 16px */
        @media (max-width: 767px) {
            input[type="text"], input[type="number"], input[type="date"], select, textarea { font-size: 16px !important; }
            input:not([type="checkbox"]):not([type="radio"]), select, textarea { min-height: 48px !important; }
        }
        /* Touch-friendly: tap targets and inputs */
        .touch-target { min-height: 44px; padding: 12px 16px; }
        .touch-input { min-height: 48px; padding: 12px 16px; }
        /* Sidebar drawer on mobile only */
        .sidebar-drawer { transition: transform 0.2s ease-out; }
        @media (max-width: 767px) {
            .sidebar-drawer { transform: translateX(-100%); }
            .sidebar-drawer.open { transform: translateX(0); }
        }
        /* Custom Loading Animation */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #f97316;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes toastFade {
            from { opacity: 0; transform: translate(-50%, 6px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        .toast-in {
            animation: toastFade 0.2s ease-out forwards;
        }
        @media print {
            .no-print { display: none !important; }
            main { padding: 0 !important; }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- 1. ส่วนแก้ไข: สร้างตัวแปลง Icon (Icon Component Wrapper) ---
        // ฟังก์ชันแปลงข้อมูลดิบจาก lucide.icons ให้เป็น SVG ที่ React เข้าใจ
        const LucideIcon = ({ name, size = 24, className = "" }) => {
            const iconData = lucide.icons[name];
            if (!iconData) return null;

            return (
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width={size}
                    height={size}
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={`lucide lucide-${name} ${className}`}
                >
                    {iconData.map((child, index) => {
                        const [tag, attrs] = child;
                        return React.createElement(tag, { ...attrs, key: index });
                    })}
                </svg>
            );
        };

        // รายชื่อไอคอนที่ใช้ทั้งหมด
        const iconNames = [
            'LayoutDashboard', 'PackagePlus', 'PackageMinus', 'History', 'Store',
            'AlertTriangle', 'Search', 'Plus', 'ArrowUpCircle', 'ArrowDownCircle',
            'ChevronRight', 'ClipboardList', 'ArrowLeftRight', 'Warehouse',
            'Calendar', 'Truck', 'Trash2', 'CheckCircle2', 'Clock', 'ClipboardCheck',
            'Save', 'RotateCcw', 'BarChart3', 'TrendingUp', 'Boxes', 'Loader2',
            'Package', 'Building2', 'Pencil', 'Tags', 'Ruler', 'Filter', 'X', 'Download', 'Printer', 'Copy', 'LogOut', 'Users', 'ScrollText', 'Calculator', 'Menu'
        ];

        // สร้าง React Component สำหรับไอคอนแต่ละตัว
        const Icons = {};
        iconNames.forEach(name => {
            Icons[name] = (props) => <LucideIcon name={name} {...props} />;
        });

        // ดึงตัวแปรออกมาใช้งาน (เหมือน import ปกติ)
        const {
            LayoutDashboard, PackagePlus, PackageMinus, History, Store, AlertTriangle, Search, Plus,
            ArrowUpCircle, ArrowDownCircle, ChevronRight, ClipboardList, ArrowLeftRight, Warehouse,
            Calendar, Truck, Trash2, CheckCircle2, Clock, ClipboardCheck, Save, RotateCcw,
            BarChart3, TrendingUp, Boxes, Loader2, Package, Building2, Pencil, Tags, Ruler, Filter, X, Download, Printer, Copy, LogOut, Users, ScrollText, Calculator, Menu
        } = Icons;
        // -----------------------------------------------------------

        // ค่า default ต้นทุนแฝงสำหรับร้านอาหาร (user ปรับลด/เพิ่มได้)
        const DEFAULT_COST_CALC_OVERHEADS = [
            { id: 1, label: 'ค่าแรง', type: 'percent', value: '20' },
            { id: 2, label: 'ค่าไฟฟ้า/ก๊าซ', type: 'percent', value: '5' },
            { id: 3, label: 'บรรจุภัณฑ์', type: 'fixed', value: '3' },
            { id: 4, label: 'ค่าเช่า/พื้นที่', type: 'percent', value: '10' },
            { id: 5, label: 'ค่าใช้จ่ายอื่น', type: 'percent', value: '5' }
        ];

        // --- Main Application ---

        const App = () => {
            // Data States (Loaded from Sheet)
            const [itemsMaster, setItemsMaster] = useState([]);
            const [branchesMaster, setBranchesMaster] = useState([]);
            const [stock, setStock] = useState({}); // { branchId: { itemId: [lots] } }
            const [transactions, setTransactions] = useState([]);
            const [menusMaster, setMenusMaster] = useState([]);
            const [menuIngredientsMaster, setMenuIngredientsMaster] = useState([]);
            const [menuOverheadsMaster, setMenuOverheadsMaster] = useState([]);

            // Loading State
            const [isLoading, setIsLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);
            const [isRefreshing, setIsRefreshing] = useState(false);
            const [isSettingUp, setIsSettingUp] = useState(false);

            // UI States
            const [activeBranch, setActiveBranch] = useState(null);
            const [sidebarOpen, setSidebarOpen] = useState(false); // mobile drawer
            const VALID_TABS = ['dashboard', 'inventory', 'stocktake', 'history', 'reports', 'items', 'branches', 'units', 'categories', 'suppliers', 'costcalc', 'audit-log', 'users'];
            const [activeTab, setActiveTabState] = useState(() => {
                try {
                    const t = new URLSearchParams(typeof window !== 'undefined' ? window.location.search : '').get('tab');
                    return (t && VALID_TABS.includes(t)) ? t : 'dashboard';
                } catch { return 'dashboard'; }
            });
            const setActiveTab = (tab) => {
                setActiveTabState(tab);
                try {
                    const u = new URL(window.location.href);
                    u.searchParams.set('tab', tab);
                    window.history.replaceState({}, '', u.toString());
                } catch (_) {}
            };
            const [searchTerm, setSearchTerm] = useState('');
            const [stockTakeSearchTerm, setStockTakeSearchTerm] = useState('');
            const [stockTakeValues, setStockTakeValues] = useState({});
            const [showModal, setShowModal] = useState(false);
            const [modalType, setModalType] = useState('in');
            const [bulkItems, setBulkItems] = useState([]);
            
            // History Filters
            const [historyFilters, setHistoryFilters] = useState({
                dateFrom: '',
                dateTo: '',
                branchId: '',
                itemId: '',
                type: '' // 'in', 'out', 'transfer', 'adjust', ''
            });
            // Report Filters (date range + search)
            const [reportDateFrom, setReportDateFrom] = useState('');
            const [reportDateTo, setReportDateTo] = useState('');
            const [reportSearchTerm, setReportSearchTerm] = useState('');
            const [priceReportDateFrom, setPriceReportDateFrom] = useState('');
            const [priceReportDateTo, setPriceReportDateTo] = useState('');
            const [priceReportItemId, setPriceReportItemId] = useState('');
            const [priceReportSupplierId, setPriceReportSupplierId] = useState('');
            const [itemsSearchTerm, setItemsSearchTerm] = useState('');
            const [branchesSearchTerm, setBranchesSearchTerm] = useState('');
            const [unitsSearchTerm, setUnitsSearchTerm] = useState('');
            const [categoriesSearchTerm, setCategoriesSearchTerm] = useState('');
            const [suppliersSearchTerm, setSuppliersSearchTerm] = useState('');
            const [inventoryLowStockOnly, setInventoryLowStockOnly] = useState(false);
            const [itemsSortBy, setItemsSortBy] = useState('name');
            const [branchesSortBy, setBranchesSortBy] = useState('name');
            const [unitsSortOrder, setUnitsSortOrder] = useState('asc');
            const [categoriesSortOrder, setCategoriesSortOrder] = useState('asc');
            const [suppliersSortOrder, setSuppliersSortOrder] = useState('asc');
            const [historySortOrder, setHistorySortOrder] = useState('newestFirst');
            const [inventorySortBy, setInventorySortBy] = useState('name');
            const [reportSortBy, setReportSortBy] = useState('name');

            const [form, setForm] = useState({
                itemId: '', amount: '', unitPrice: '', supplier: '', expiryDate: '', targetBranchId: '', note: ''
            });
            const [modalItemSearch, setModalItemSearch] = useState('');
            const [modalBranchSearch, setModalBranchSearch] = useState('');

            // Master data forms (Items / Branches / Units / Categories CRUD)
            const [itemForm, setItemForm] = useState({ id: '', name: '', unit: '', minStock: '', category: '' });
            const [branchForm, setBranchForm] = useState({ id: '', name: '', isHQ: false });
            const [unitForm, setUnitForm] = useState({ id: '', name: '' });
            const [categoryForm, setCategoryForm] = useState({ id: '', name: '' });
            const [showItemModal, setShowItemModal] = useState(false);
            const [showBranchModal, setShowBranchModal] = useState(false);
            const [showUnitModal, setShowUnitModal] = useState(false);
            const [showCategoryModal, setShowCategoryModal] = useState(false);
            const [showSupplierModal, setShowSupplierModal] = useState(false);
            const [showItemSupplierModal, setShowItemSupplierModal] = useState(false);
            const [itemSupplierForm, setItemSupplierForm] = useState({ itemId: '', supplierId: '', nameAtSupplier: '' });
            const [itemSupplierEditingSupplierId, setItemSupplierEditingSupplierId] = useState(null);
            const [editingItem, setEditingItem] = useState(null);
            const [editingBranch, setEditingBranch] = useState(null);
            const [editingUnit, setEditingUnit] = useState(null);
            const [editingCategory, setEditingCategory] = useState(null);
            const [editingSupplier, setEditingSupplier] = useState(null);

            const [supplierForm, setSupplierForm] = useState({ id: '', name: '' });
            const [unitsMaster, setUnitsMaster] = useState([]);
            const [categoriesMaster, setCategoriesMaster] = useState([]);
            const [suppliersMaster, setSuppliersMaster] = useState([]);
            const [itemSuppliersMaster, setItemSuppliersMaster] = useState([]);
            const [toast, setToast] = useState({ message: '', show: false, type: 'success' }); // 'success' | 'error'
            const [confirmModal, setConfirmModal] = useState({ open: false, title: '', message: '', onConfirm: () => {} });

            const AUTH_STORAGE_KEY = 'ko-stock-auth';
            const [user, setUser] = useState(null);
            const [token, setToken] = useState(null);
            const [requirePasswordChange, setRequirePasswordChange] = useState(false);
            const [loginForm, setLoginForm] = useState({ username: '', password: '' });
            const [changePasswordForm, setChangePasswordForm] = useState({ newPassword: '', confirmPassword: '' });
            const [authLoading, setAuthLoading] = useState(false);

            const [auditLogRows, setAuditLogRows] = useState([]);
            const [auditLogDateFrom, setAuditLogDateFrom] = useState('');
            const [auditLogDateTo, setAuditLogDateTo] = useState('');
            const [usersList, setUsersList] = useState([]);
            const [showUserModal, setShowUserModal] = useState(false);
            const [userForm, setUserForm] = useState({ id: '', username: '', password: '', role: 'viewer' });
            const [editingUser, setEditingUser] = useState(null);

            // Cost calc (ต้นทุนอาหาร / ราคาขายแนะนำ) — ต้นทุนแฝงมีค่า default หลักของร้านอาหาร
            const [costCalcIngredients, setCostCalcIngredients] = useState([]);
            const [costCalcOverheads, setCostCalcOverheads] = useState(() => DEFAULT_COST_CALC_OVERHEADS.map((o, i) => ({ ...o, id: o.id })));
            const [costCalcTargetFoodCostPercent, setCostCalcTargetFoodCostPercent] = useState(30);
            const [costCalcItemSearch, setCostCalcItemSearch] = useState('');
            const [costCalcMenuId, setCostCalcMenuId] = useState('');
            const [costCalcMenuName, setCostCalcMenuName] = useState('');
            const [costCalcMenuNote, setCostCalcMenuNote] = useState('');

            const showConfirm = (opts) => setConfirmModal({ open: true, title: opts.title || 'ยืนยัน', message: opts.message || '', onConfirm: opts.onConfirm || (() => {}) });

            const showToast = (msg, type = 'success') => {
                setToast({ message: msg, show: true, type });
            };
            
            const showError = (err, context = '') => {
                let msg = 'เกิดข้อผิดพลาด';
                if (typeof err === 'string') {
                    msg = err;
                } else if (err && err.message) {
                    msg = err.message;
                }
                if (context) msg = `${context}: ${msg}`;
                showToast(msg, 'error');
            };

            const persistAuth = (t, u) => {
                try {
                    if (typeof sessionStorage !== 'undefined' && t && u)
                        sessionStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify({ token: t, user: u }));
                } catch (_) {}
            };

            const clearAuth = () => {
                setToken(null);
                setUser(null);
                setRequirePasswordChange(false);
                try {
                    if (typeof sessionStorage !== 'undefined') sessionStorage.removeItem(AUTH_STORAGE_KEY);
                } catch (_) {}
            };

            const handleLogin = () => {
                const u = String(loginForm.username || '').trim();
                const p = String(loginForm.password || '');
                if (!u || !p) { showError('กรุณากรอกชื่อผู้ใช้และรหัสผ่าน'); return; }
                setAuthLoading(true);
                google.script.run
                    .withSuccessHandler((res) => {
                        setAuthLoading(false);
                        if (res && res.success) {
                            setToken(res.token);
                            setUser(res.user);
                            setRequirePasswordChange(!!res.requirePasswordChange);
                            persistAuth(res.token, res.user);
                            setLoginForm({ username: '', password: '' });
                        } else {
                            showError(res && res.error ? res.error : 'เข้าสู่ระบบไม่สำเร็จ');
                        }
                    })
                    .withFailureHandler((err) => {
                        setAuthLoading(false);
                        showError(err, 'เข้าสู่ระบบไม่สำเร็จ');
                    })
                    .login(u, p);
            };

            const handleChangePassword = () => {
                const np = String(changePasswordForm.newPassword || '');
                const cp = String(changePasswordForm.confirmPassword || '');
                if (np.length < 4) { showError('รหัสผ่านใหม่ต้องอย่างน้อย 4 ตัวอักษร'); return; }
                if (np !== cp) { showError('รหัสผ่านใหม่กับยืนยันไม่ตรงกัน'); return; }
                setAuthLoading(true);
                google.script.run
                    .withSuccessHandler((res) => {
                        setAuthLoading(false);
                        if (res && res.success) {
                            setRequirePasswordChange(false);
                            setChangePasswordForm({ newPassword: '', confirmPassword: '' });
                        } else {
                            showError(res && res.error ? res.error : 'เปลี่ยนรหัสผ่านไม่สำเร็จ');
                        }
                    })
                    .withFailureHandler((err) => {
                        setAuthLoading(false);
                        showError(err, 'เปลี่ยนรหัสผ่านไม่สำเร็จ');
                    })
                    .changePassword(token, np);
            };

            useEffect(() => {
                try {
                    const raw = typeof sessionStorage !== 'undefined' ? sessionStorage.getItem(AUTH_STORAGE_KEY) : null;
                    if (raw) {
                        const o = JSON.parse(raw);
                        if (o && o.token && o.user) {
                            setToken(o.token);
                            setUser(o.user);
                        }
                    }
                } catch (_) {}
            }, []);

            useEffect(() => {
                if (!toast.show) return;
                const t = setTimeout(() => setToast(prev => ({ ...prev, show: false })), 2200);
                return () => clearTimeout(t);
            }, [toast.show]);

            useEffect(() => {
                const onKey = (e) => {
                    if (e.key !== 'Escape') return;
                    if (isSaving) return;
                    if (confirmModal.open) { setConfirmModal(prev => ({ ...prev, open: false })); return; }
                    if (showModal) { setShowModal(false); return; }
                    if (showItemModal) { setShowItemModal(false); return; }
                    if (showBranchModal) { setShowBranchModal(false); return; }
                    if (showUnitModal) { setShowUnitModal(false); return; }
                    if (showCategoryModal) { setShowCategoryModal(false); return; }
                    if (showSupplierModal) { setShowSupplierModal(false); return; }
                    if (showItemSupplierModal) { setShowItemSupplierModal(false); return; }
                    if (showUserModal) { setShowUserModal(false); return; }
                };
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, [confirmModal.open, showModal, showItemModal, showBranchModal, showUnitModal, showCategoryModal, showSupplierModal, showItemSupplierModal, showUserModal, isSaving]);

            const BRANCH_STORAGE_KEY = 'ko-stock-active-branch-id';
            const HISTORY_FILTERS_KEY = 'ko-stock-history-filters';
            const REPORT_FILTERS_KEY = 'ko-stock-report-filters';
            const SORT_PREFS_KEY = 'ko-stock-sort-prefs';
            const INVENTORY_UI_KEY = 'ko-stock-inventory-ui';

            // Initial Data Fetch
            const loadData = (retryCount = 0) => {
                google.script.run
                    .withSuccessHandler((data) => {
                        try {
                            if (data && data.error === 'Unauthorized') {
                                clearAuth();
                                setIsLoading(false);
                                return;
                            }
                            setItemsMaster(data.items || []);
                            setBranchesMaster(data.branches || []);
                            setUnitsMaster(data.units || []);
                            setCategoriesMaster(data.categories || []);
                            setSuppliersMaster(data.suppliers || []);
                            setItemSuppliersMaster(data.itemSuppliers || []);
                            setMenusMaster(data.menus || []);
                            setMenuIngredientsMaster(data.menuIngredients || []);
                            setMenuOverheadsMaster(data.menuOverheads || []);
                            setStock(data.stock || {});
                            setTransactions(data.transactions || []);
                            const branches = data.branches || [];
                            if (branches.length === 0) {
                                setActiveBranch(null);
                            } else {
                                const storedId = typeof sessionStorage !== 'undefined' ? sessionStorage.getItem(BRANCH_STORAGE_KEY) : null;
                                const restored = storedId ? branches.find(b => b.id === storedId) : null;
                                setActiveBranch(restored || branches[0]);
                            }
                            try {
                                const raw = typeof sessionStorage !== 'undefined' ? sessionStorage.getItem(HISTORY_FILTERS_KEY) : null;
                                if (raw) {
                                    const p = JSON.parse(raw);
                                    if (p && typeof p === 'object') setHistoryFilters({ dateFrom: p.dateFrom || '', dateTo: p.dateTo || '', branchId: p.branchId || '', itemId: p.itemId || '', type: p.type || '' });
                                }
                            } catch (_) {}
                            try {
                                const r = typeof sessionStorage !== 'undefined' ? sessionStorage.getItem(REPORT_FILTERS_KEY) : null;
                                if (r) {
                                    const q = JSON.parse(r);
                                    if (q && typeof q === 'object') {
                                        if (q.reportDateFrom != null) setReportDateFrom(String(q.reportDateFrom));
                                        if (q.reportDateTo != null) setReportDateTo(String(q.reportDateTo));
                                        if (q.reportSearchTerm != null) setReportSearchTerm(String(q.reportSearchTerm));
                                    }
                                }
                            } catch (_) {}
                            try {
                                const s = typeof sessionStorage !== 'undefined' ? sessionStorage.getItem(SORT_PREFS_KEY) : null;
                                if (s) {
                                    const z = JSON.parse(s);
                                    if (z && typeof z === 'object') {
                                        if (['name', 'category', 'minStock'].includes(z.itemsSortBy)) setItemsSortBy(z.itemsSortBy);
                                        if (['name', 'hqFirst'].includes(z.branchesSortBy)) setBranchesSortBy(z.branchesSortBy);
                                        if (['asc', 'desc'].includes(z.unitsSortOrder)) setUnitsSortOrder(z.unitsSortOrder);
                                        if (['asc', 'desc'].includes(z.categoriesSortOrder)) setCategoriesSortOrder(z.categoriesSortOrder);
                                        if (['newestFirst', 'oldestFirst'].includes(z.historySortOrder)) setHistorySortOrder(z.historySortOrder);
                                        if (['name', 'totalQty', 'lowStockFirst'].includes(z.inventorySortBy)) setInventorySortBy(z.inventorySortBy);
                                        if (['name', 'totalQty', 'lowStockFirst'].includes(z.reportSortBy)) setReportSortBy(z.reportSortBy);
                                    }
                                }
                            } catch (_) {}
                            try {
                                const u = typeof sessionStorage !== 'undefined' ? sessionStorage.getItem(INVENTORY_UI_KEY) : null;
                                if (u) {
                                    const v = JSON.parse(u);
                                    if (v && typeof v === 'object' && typeof v.inventoryLowStockOnly === 'boolean') setInventoryLowStockOnly(v.inventoryLowStockOnly);
                                }
                            } catch (_) {}
                            setIsLoading(false);
                        } catch (parseErr) {
                            setIsLoading(false);
                            showError(parseErr, 'เกิดข้อผิดพลาดในการประมวลผลข้อมูล');
                        }
                    })
                    .withFailureHandler((err) => {
                        if (retryCount < 2) {
                            setTimeout(() => loadData(retryCount + 1), 1000 * (retryCount + 1));
                        } else {
                            showError(err, 'โหลดข้อมูลไม่สำเร็จ');
                            setIsLoading(false);
                        }
                    })
                    .getSystemData(token);
            };
            
            useEffect(() => {
                if (!token || requirePasswordChange) setIsLoading(false);
            }, [token, requirePasswordChange]);

            useEffect(() => {
                if (!token || requirePasswordChange) return;
                setIsLoading(true);
                loadData();
            }, [token, requirePasswordChange]);

            useEffect(() => {
                if (user?.role === 'viewer' && ['items','branches','units','categories','suppliers','costcalc','audit-log','users'].includes(activeTab))
                    setActiveTab('dashboard');
            }, [user?.role, activeTab]);

            useEffect(() => {
                if (activeBranch?.id && typeof sessionStorage !== 'undefined') sessionStorage.setItem(BRANCH_STORAGE_KEY, activeBranch.id);
                else if (typeof sessionStorage !== 'undefined') sessionStorage.removeItem(BRANCH_STORAGE_KEY);
            }, [activeBranch?.id]);

            useEffect(() => {
                if (typeof sessionStorage === 'undefined') return;
                try { sessionStorage.setItem(HISTORY_FILTERS_KEY, JSON.stringify(historyFilters)); } catch (_) {}
            }, [historyFilters]);

            useEffect(() => {
                if (typeof sessionStorage === 'undefined') return;
                try { sessionStorage.setItem(REPORT_FILTERS_KEY, JSON.stringify({ reportDateFrom, reportDateTo, reportSearchTerm })); } catch (_) {}
            }, [reportDateFrom, reportDateTo, reportSearchTerm]);

            useEffect(() => {
                if (typeof sessionStorage === 'undefined') return;
                try { sessionStorage.setItem(SORT_PREFS_KEY, JSON.stringify({ itemsSortBy, branchesSortBy, unitsSortOrder, categoriesSortOrder, historySortOrder, inventorySortBy, reportSortBy })); } catch (_) {}
            }, [itemsSortBy, branchesSortBy, unitsSortOrder, categoriesSortOrder, historySortOrder, inventorySortBy, reportSortBy]);

            useEffect(() => {
                if (typeof sessionStorage === 'undefined') return;
                try { sessionStorage.setItem(INVENTORY_UI_KEY, JSON.stringify({ inventoryLowStockOnly })); } catch (_) {}
            }, [inventoryLowStockOnly]);

            // Computed Inventory
            const currentBranchInventory = useMemo(() => {
                if (!activeBranch) return [];
                const branchStock = stock[activeBranch.id] || {};
                return itemsMaster.map(item => {
                    const lots = branchStock[item.id] || [];
                    const totalQty = lots.reduce((sum, lot) => sum + lot.remainingQty, 0);
                    return { ...item, totalQty, lots };
                });
            }, [stock, activeBranch, itemsMaster]);

            const filteredInventory = currentBranchInventory.filter(item =>
                (item.name || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
                (item.category || '').toLowerCase().includes(searchTerm.toLowerCase())
            );

            const parseThaiDate = (dateStr) => {
                if (!dateStr) return null;
                // Format: "27/1/2569 21:31:21" or "27/1/2569"
                const parts = String(dateStr).trim().split(/[\s\/]+/);
                if (parts.length < 3) return null;
                const day = parseInt(parts[0], 10);
                const month = parseInt(parts[1], 10) - 1; // JS months are 0-indexed
                const yearBE = parseInt(parts[2], 10);
                const yearCE = yearBE - 543; // Convert BE to CE
                const hour = parts[3] ? parseInt(parts[3], 10) : 0;
                const minute = parts[4] ? parseInt(parts[4], 10) : 0;
                const second = parts[5] ? parseInt(parts[5], 10) : 0;
                return new Date(yearCE, month, day, hour, minute, second);

                const month = String(date.getMonth() + 1).padStart(2, '0');
                const year = date.getFullYear();
                const hours = String(date.getHours()).padStart(2, '0');
                const minutes = String(date.getMinutes()).padStart(2, '0');
                const seconds = String(date.getSeconds()).padStart(2, '0');
                return `${day}/${month}/${year} ${hours}:${minutes}:${seconds}`;
            };

                const blob = new Blob([BOM + csv], { type: 'text/csv;charset=utf-8' });

            // Helper: FIFO Deduction Logic (Client Side Calculation)
            const calculateFIFODeduction = (currentStock, branchId, itemId, amount) => {
                let remaining = parseFloat(amount);
                const branchData = currentStock[branchId] || {};
                const lots = [...(branchData[itemId] || [])].sort((a, b) => new Date(a.receivedDate) - new Date(b.receivedDate));

                const updates = [];
                const keptLots = [];

                for (const lot of lots) {
                    if (remaining <= 0) {
                        keptLots.push(lot);
                        continue;
                    }

                    if (lot.remainingQty <= remaining) {
                        remaining -= lot.remainingQty;
                        updates.push({ ...lot, remainingQty: 0, isNewLot: false, branchId, itemId });
                    } else {
                        const newQty = lot.remainingQty - remaining;
                        updates.push({ ...lot, remainingQty: newQty, isNewLot: false, branchId, itemId });
                        keptLots.push({ ...lot, remainingQty: newQty });
                        remaining = 0;
                    }
                }

                if (remaining > 0) return null; // Not enough stock

                return { keptLots, updates };

                                </div>
                                <div className="p-6 sm:p-8 space-y-4">
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">ชื่อหน่วย *</label>
                                        <input type="text" value={unitForm.name} onChange={e => setUnitForm({ ...unitForm, name: e.target.value })} placeholder="เช่น กก., ถุง, ลัง" className="w-full min-h-[44px] px-4 py-3 bg-slate-50 rounded-xl border-0 outline-none focus:ring-2 focus:ring-orange-500 text-base" required />
                                        {!String(unitForm.name || '').trim() && <p className="text-rose-500 text-xs mt-1">กรุณากรอกชื่อหน่วย</p>}
                                    </div>
                                    <div className="flex gap-3 pt-2">
                                        <button onClick={() => setShowUnitModal(false)} className="flex-1 min-h-[48px] px-4 py-3 rounded-xl font-bold border-2 border-slate-200 text-slate-600 hover:bg-slate-50 transition-all">ยกเลิก</button>
                                        <button onClick={handleSaveUnit} disabled={isSaving || !unitFormValid} className={`flex-1 min-h-[48px] px-4 py-3 rounded-xl font-bold text-white transition-all ${isSaving || !unitFormValid ? 'bg-slate-300 cursor-not-allowed' : 'bg-orange-500 hover:bg-orange-600'}`}>{isSaving ? 'กำลังบันทึก...' : 'บันทึก'}</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Category Modal */}
                    {showCategoryModal && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-xl z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 overflow-y-auto">
                            <div className="bg-white rounded-t-3xl sm:rounded-[32px] w-full sm:max-w-lg overflow-hidden shadow-2xl">
                                <div className="p-6 sm:p-8 bg-orange-500 text-white flex justify-between items-center">
                                    <h3 className="text-xl sm:text-2xl font-black">{editingCategory ? 'แก้ไขหมวดหมู่' : 'เพิ่มหมวดหมู่'}</h3>
                                    <button onClick={() => setShowCategoryModal(false)} className="min-w-[44px] min-h-[44px] flex items-center justify-center rounded-full bg-white/20 hover:bg-white/30 transition-all" aria-label="ปิด">✕</button>
                                </div>
                                <div className="p-6 sm:p-8 space-y-4">
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">ชื่อหมวดหมู่ *</label>
                                        <input type="text" value={categoryForm.name} onChange={e => setCategoryForm({ ...categoryForm, name: e.target.value })} placeholder="เช่น วัตถุดิบ, ผักสด" className="w-full min-h-[44px] px-4 py-3 bg-slate-50 rounded-xl border-0 outline-none focus:ring-2 focus:ring-orange-500 text-base" required />
                                        {!String(categoryForm.name || '').trim() && <p className="text-rose-500 text-xs mt-1">กรุณากรอกชื่อหมวดหมู่</p>}
                                    </div>
                                    <div className="flex gap-3 pt-2">
                                        <button onClick={() => setShowCategoryModal(false)} className="flex-1 min-h-[48px] px-4 py-3 rounded-xl font-bold border-2 border-slate-200 text-slate-600 hover:bg-slate-50 transition-all">ยกเลิก</button>
                                        <button onClick={handleSaveCategory} disabled={isSaving || !categoryFormValid} className={`flex-1 min-h-[48px] px-4 py-3 rounded-xl font-bold text-white transition-all ${isSaving || !categoryFormValid ? 'bg-slate-300 cursor-not-allowed' : 'bg-orange-500 hover:bg-orange-600'}`}>{isSaving ? 'กำลังบันทึก...' : 'บันทึก'}</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Supplier Modal */}
                    {showSupplierModal && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-xl z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 overflow-y-auto">
                            <div className="bg-white rounded-t-3xl sm:rounded-[32px] w-full sm:max-w-lg overflow-hidden shadow-2xl">
                                <div className="p-6 sm:p-8 bg-orange-500 text-white flex justify-between items-center">
                                    <h3 className="text-xl sm:text-2xl font-black">{editingSupplier ? 'แก้ไขคู่ค้า' : 'เพิ่มคู่ค้า'}</h3>
                                    <button onClick={() => setShowSupplierModal(false)} className="min-w-[44px] min-h-[44px] flex items-center justify-center rounded-full bg-white/20 hover:bg-white/30 transition-all" aria-label="ปิด">✕</button>
                                </div>
                                <div className="p-6 sm:p-8 space-y-4">
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">ชื่อคู่ค้า *</label>
                                        <input type="text" value={supplierForm.name} onChange={e => setSupplierForm({ ...supplierForm, name: e.target.value })} placeholder="เช่น Makro, ตลาดสด" className="w-full min-h-[44px] px-4 py-3 bg-slate-50 rounded-xl border-0 outline-none focus:ring-2 focus:ring-orange-500 text-base" required />
                                        {!String(supplierForm.name || '').trim() && <p className="text-rose-500 text-xs mt-1">กรุณากรอกชื่อคู่ค้า</p>}
                                    </div>
                                    <div className="flex gap-3 pt-2">
                                        <button onClick={() => setShowSupplierModal(false)} className="flex-1 min-h-[48px] px-4 py-3 rounded-xl font-bold border-2 border-slate-200 text-slate-600 hover:bg-slate-50 transition-all">ยกเลิก</button>
                                        <button onClick={handleSaveSupplier} disabled={isSaving || !supplierFormValid} className={`flex-1 min-h-[48px] px-4 py-3 rounded-xl font-bold text-white transition-all ${isSaving || !supplierFormValid ? 'bg-slate-300 cursor-not-allowed' : 'bg-orange-500 hover:bg-orange-600'}`}>{isSaving ? 'กำลังบันทึก...' : 'บันทึก'}</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ItemSupplier Modal (Add/Edit ซื้อได้ที่คู่ค้า) */}
                    {showItemSupplierModal && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-xl z-[55] flex items-end sm:items-center justify-center p-0 sm:p-4 overflow-y-auto">
                            <div className="bg-white rounded-t-3xl sm:rounded-3xl w-full sm:max-w-md overflow-hidden shadow-2xl">
                                <div className="p-6 sm:p-8 bg-orange-500 text-white flex justify-between items-center">
                                    <h3 className="text-xl font-black">{itemSupplierEditingSupplierId ? 'แก้ไขชื่อที่คู่ค้า' : 'เพิ่มคู่ค้า'}</h3>
                                    <button onClick={() => setShowItemSupplierModal(false)} className="min-w-[44px] min-h-[44px] flex items-center justify-center rounded-full bg-white/20 hover:bg-white/30 transition-all" aria-label="ปิด">✕</button>
                                </div>
                                <div className="p-6 sm:p-8 space-y-4">
                                    {itemSupplierEditingSupplierId ? (
                                        <div>
                                            <label className="block text-sm font-bold text-slate-700 mb-1">คู่ค้า</label>
                                            <p className="px-4 py-3 bg-slate-100 rounded-xl font-medium text-slate-700">{(suppliersMaster.find(s => s.id === itemSupplierForm.supplierId) || {}).name || itemSupplierForm.supplierId}</p>
                                        </div>
                                    ) : (
                                        <div>
                                            <label className="block text-sm font-bold text-slate-700 mb-1">คู่ค้า *</label>
                                            <select value={itemSupplierForm.supplierId} onChange={e => setItemSupplierForm({ ...itemSupplierForm, supplierId: e.target.value })} className="w-full min-h-[44px] px-4 py-3 bg-slate-50 rounded-xl border-0 outline-none focus:ring-2 focus:ring-orange-500 text-base">
                                                <option value="">— เลือกคู่ค้า —</option>
                                                {suppliersMaster.filter(s => !itemSuppliersForItem.some(r => r.supplierId === s.id)).map(s => (
                                                    <option key={s.id} value={s.id}>{s.name}</option>
                                                ))}
                                            </select>
                                        </div>
                                    )}
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">ชื่อสินค้าที่คู่ค้า (ถ้ามี)</label>
                                        <input type="text" value={itemSupplierForm.nameAtSupplier} onChange={e => setItemSupplierForm({ ...itemSupplierForm, nameAtSupplier: e.target.value })} placeholder="เช่น SKU, ชื่อที่ร้านคู่ค้าใช้" className="w-full min-h-[44px] px-4 py-3 bg-slate-50 rounded-xl border-0 outline-none focus:ring-2 focus:ring-orange-500 text-base" />
                                    </div>
                                    <div className="flex gap-3 pt-2">
                                        <button onClick={() => setShowItemSupplierModal(false)} className="flex-1 min-h-[48px] px-4 py-3 rounded-xl font-bold border-2 border-slate-200 text-slate-600 hover:bg-slate-50 transition-all">ยกเลิก</button>
                                        <button onClick={handleSaveItemSupplier} disabled={isSaving || !itemSupplierFormValid} className={`flex-1 min-h-[48px] px-4 py-3 rounded-xl font-bold text-white transition-all ${isSaving || !itemSupplierFormValid ? 'bg-slate-300 cursor-not-allowed' : 'bg-orange-500 hover:bg-orange-600'}`}>{isSaving ? 'กำลังบันทึก...' : 'บันทึก'}</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* User Modal (Add/Edit) */}
                    {showUserModal && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-xl z-[55] flex items-end sm:items-center justify-center p-0 sm:p-4 overflow-y-auto">
                            <div className="bg-white rounded-t-3xl sm:rounded-3xl w-full sm:max-w-md overflow-hidden shadow-2xl">
                                <div className="p-6 sm:p-8 bg-orange-500 text-white flex justify-between items-center">
                                    <h3 className="text-xl font-black">{editingUser ? 'แก้ไขผู้ใช้' : 'เพิ่มผู้ใช้'}</h3>
                                    <button onClick={() => setShowUserModal(false)} className="min-w-[44px] min-h-[44px] flex items-center justify-center rounded-full bg-white/20 hover:bg-white/30 transition-all" aria-label="ปิด">✕</button>
                                </div>
                                <div className="p-6 sm:p-8 space-y-4">
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">ชื่อผู้ใช้ *</label>
                                        <input type="text" value={userForm.username} onChange={e => setUserForm({ ...userForm, username: e.target.value })} placeholder="ชื่อผู้ใช้" disabled={!!editingUser} className="w-full min-h-[44px] px-4 py-3 bg-slate-50 rounded-xl border-0 outline-none focus:ring-2 focus:ring-orange-500 text-base disabled:opacity-70 disabled:cursor-not-allowed" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">{editingUser ? 'รหัสผ่านใหม่ (เว้นว่างถ้าไม่เปลี่ยน)' : 'รหัสผ่าน *'}</label>
                                        <input type="password" value={userForm.password} onChange={e => setUserForm({ ...userForm, password: e.target.value })} placeholder={editingUser ? 'เว้นว่างถ้าไม่เปลี่ยน' : 'อย่างน้อย 4 ตัวอักษร'} className="w-full min-h-[44px] px-4 py-3 bg-slate-50 rounded-xl border-0 outline-none focus:ring-2 focus:ring-orange-500 text-base" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">บทบาท</label>
                                        <select value={userForm.role} onChange={e => setUserForm({ ...userForm, role: e.target.value })} className="w-full min-h-[44px] px-4 py-3 bg-slate-50 rounded-xl border-0 outline-none focus:ring-2 focus:ring-orange-500 text-base">
                                            <option value="viewer">Viewer</option>
                                            {user?.role === 'master' && <option value="admin">Admin</option>}
                                            {user?.role === 'master' && <option value="master">Master</option>}
                                        </select>
                                    </div>
                                    <div className="flex gap-3 pt-2">
                                        <button onClick={() => setShowUserModal(false)} className="flex-1 min-h-[48px] px-4 py-3 rounded-xl font-bold border-2 border-slate-200 text-slate-600 hover:bg-slate-50 transition-all">ยกเลิก</button>
                                        <button onClick={handleSaveUser} disabled={isSaving || !userForm.username.trim()} className={`flex-1 min-h-[48px] px-4 py-3 rounded-xl font-bold text-white transition-all ${isSaving || !userForm.username.trim() ? 'bg-slate-300 cursor-not-allowed' : 'bg-orange-500 hover:bg-orange-600'}`}>{isSaving ? 'กำลังบันทึก...' : 'บันทึก'}</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Toast — แจ้งผลแบบไม่ block UI */}
                    {toast.show && (
                        <div className={`fixed bottom-4 left-1/2 -translate-x-1/2 z-[60] px-6 py-3 rounded-2xl text-white font-bold shadow-lg toast-in ${toast.type === 'error' ? 'bg-rose-600' : 'bg-emerald-600'}`}>
                            {toast.message}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
